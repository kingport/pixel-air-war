<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>像素空战 - Pixel Air War</title>
  <style>
    @font-face {
      font-family: 'PixelFont';
      src: url('data:font/woff2;charset=utf-8;base64,') format('woff2');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: monospace;
      image-rendering: pixelated;
    }
    #gameContainer {
      position: relative;
      border: 3px solid #333;
      box-shadow: 0 0 30px rgba(0, 150, 255, 0.3);
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #uiOverlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #uiOverlay.active { pointer-events: auto; }
    .screen-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-family: monospace;
      text-align: center;
    }
    .screen-overlay h1 {
      font-size: 36px;
      color: #00e5ff;
      text-shadow: 0 0 10px #00e5ff, 2px 2px 0 #005f6b;
      margin-bottom: 20px;
      letter-spacing: 4px;
    }
    .screen-overlay h2 {
      font-size: 22px;
      color: #ff6b35;
      margin-bottom: 10px;
    }
    .screen-overlay p {
      font-size: 14px;
      color: #aaa;
      margin: 5px 0;
    }
    .btn {
      pointer-events: auto;
      margin-top: 20px;
      padding: 12px 40px;
      font-size: 18px;
      font-family: monospace;
      background: linear-gradient(180deg, #00e5ff, #0088aa);
      color: #000;
      border: 2px solid #00e5ff;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.15s;
      image-rendering: pixelated;
    }
    .btn:hover {
      background: linear-gradient(180deg, #33ffff, #00bbdd);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
      transform: scale(1.05);
    }
    .btn-revive {
      background: linear-gradient(180deg, #ff6b35, #cc4400);
      border-color: #ff6b35;
      color: #fff;
    }
    .btn-revive:hover {
      background: linear-gradient(180deg, #ff8855, #ff6b35);
      box-shadow: 0 0 15px rgba(255, 107, 53, 0.6);
    }
    .score-display {
      font-size: 24px;
      color: #ffd700;
      margin: 10px 0;
    }
    .controls-info {
      margin-top: 20px;
      font-size: 12px;
      color: #666;
      line-height: 1.8;
    }
    .revive-panel {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.8);
    }
    .revive-panel h2 { color: #ff4444; font-size: 28px; margin-bottom: 15px; font-family: monospace; }
    .revive-panel p { color: #ccc; font-size: 14px; margin-bottom: 5px; font-family: monospace; }
    .revive-buttons { display: flex; gap: 15px; margin-top: 15px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="uiOverlay" class="active">
      <div id="startScreen" class="screen-overlay">
        <h1>⚡ 像素空战 ⚡</h1>
        <h2>PIXEL AIR WAR</h2>
        <p>消灭敌机 · 挑战Boss · 争夺高分</p>
        <button class="btn" id="startBtn">开始游戏</button>
        <div class="controls-info">
          <p>🖱️ 鼠标/触摸 移动战机</p>
          <p>🔫 自动射击</p>
          <p>💣 空格键 释放炸弹</p>
        </div>
      </div>
      <div id="deathScreen" class="revive-panel hidden">
        <h2>💥 战机被击落！</h2>
        <p>当前得分: <span id="deathScore">0</span></p>
        <p id="reviveCount">剩余复活次数: 3</p>
        <div class="revive-buttons">
          <button class="btn btn-revive" id="reviveBtn">原地复活</button>
          <button class="btn" id="gameOverBtn">结束游戏</button>
        </div>
      </div>
      <div id="gameOverScreen" class="screen-overlay hidden">
        <h1>GAME OVER</h1>
        <div class="score-display">最终得分: <span id="finalScore">0</span></div>
        <p>击杀敌机: <span id="killCount">0</span></p>
        <p>击杀Boss: <span id="bossKillCount">0</span></p>
        <button class="btn" id="restartBtn">再来一局</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
